name: Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          architecture: x64
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-win.txt pyinstaller
          python -m pip check

      - name: Run tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Build executable
        shell: pwsh
        run: .\build_windows.ps1 -Name "TikTokDanmuPrinter"

      - name: Validate and smoke-test executable
        shell: pwsh
        run: |
          $exe = Resolve-Path "dist\TikTokDanmuPrinter.exe"
          $bytes = [System.IO.File]::ReadAllBytes($exe)
          if ($bytes.Length -lt 1MB -or $bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            throw "Build output is not a valid Windows PE executable."
          }

          $process = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 12
          if ($process.HasExited) {
            throw "Executable exited during startup smoke test with code $($process.ExitCode)."
          }
          Stop-Process -Id $process.Id -Force

      - name: Create release files
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $bundleName = "TikTokDanmuPrinter-$tag-Windows-x64"
          $bundleRoot = Join-Path "release" $bundleName

          New-Item -ItemType Directory -Force -Path $bundleRoot | Out-Null
          Copy-Item "dist\TikTokDanmuPrinter.exe" "$bundleRoot\TikTokDanmuPrinter.exe"
          Copy-Item "README.md" "$bundleRoot\README.md"
          Copy-Item "CONFIG_GUIDE.txt" "$bundleRoot\CONFIG_GUIDE.txt"
          Compress-Archive -Path "$bundleRoot\*" -DestinationPath "release\$bundleName.zip" -Force

          $files = @(
            "dist\TikTokDanmuPrinter.exe",
            "release\$bundleName.zip"
          )
          $checksums = foreach ($file in $files) {
            $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $([System.IO.Path]::GetFileName($file))"
          }
          $checksums | Set-Content "release\SHA256SUMS.txt" -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: TikTokDanmuPrinter-${{ github.ref_name }}-Windows-x64
          path: |
            dist/TikTokDanmuPrinter.exe
            release/TikTokDanmuPrinter-${{ github.ref_name }}-Windows-x64.zip
            release/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assets = @(
            "dist\TikTokDanmuPrinter.exe",
            "release\TikTokDanmuPrinter-$tag-Windows-x64.zip",
            "release\SHA256SUMS.txt"
          )

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber
          } else {
            gh release create $tag @assets `
              --title "TikTok 弹幕打印 $tag" `
              --notes-file "docs\RELEASE_NOTES_v1.0.0.md" `
              --verify-tag
          }
